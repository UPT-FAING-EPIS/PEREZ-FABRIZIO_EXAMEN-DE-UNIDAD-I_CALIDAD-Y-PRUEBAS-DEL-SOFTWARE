version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: recipeplatform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: RecipePlatformDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recipeplatform-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=RecipePlatformDb;Username=postgres;Password=postgres;SSL Mode=Require;Trust Server Certificate=false;
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/RecipePlatform.API:/app
      - /app/bin
      - /app/obj

volumes:
  postgres_data: